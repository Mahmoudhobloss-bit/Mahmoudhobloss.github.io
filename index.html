<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CLVR</title>
<meta name="description" content="CLVR — apps that run the heart of hospitality operations. Join the waitlist." />

<!-- Supabase JS client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  /* ============================================
     FONT: Morn (custom)
     Files must be in a /fonts folder next to this HTML
     ============================================ */
  @font-face {
    font-family: 'Morn';
    src: url('fonts/Morn-Thin.otf') format('opentype');
    font-weight: 200;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Morn';
    src: url('fonts/Morn-Regular.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Morn';
    src: url('fonts/Morn-Medium.ttf') format('truetype');
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg: #000000;
    --ink: #ffffff;
    --ink-dim: #8a8a8a;
    --ink-faint: #4a4a4a;
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.18);
    --error: #b8b8b8;
    --success: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Morn', -apple-system, sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .page {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 2.5rem clamp(1.5rem, 5vw, 4rem);
  }

  /* Top bar */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: fadeIn 1.2s ease 0.1s both;
  }

  .logo {
    font-weight: 500;
    font-size: 1.1rem;
    letter-spacing: 0.32em;
    color: var(--ink);
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.4rem 0.9rem;
    border: 1px solid var(--border);
    border-radius: 100px;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-dim);
    font-weight: 500;
  }

  .pulse {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--ink);
    box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.6);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.5); }
    50% { box-shadow: 0 0 0 8px rgba(255, 255, 255, 0); }
  }

  /* Hero */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: 720px;
    margin: 4rem 0;
  }

  h1 {
    font-weight: 200;
    font-size: clamp(2.5rem, 6.5vw, 4.75rem);
    line-height: 1.08;
    letter-spacing: -0.02em;
    margin-bottom: 2rem;
    animation: riseIn 1.2s ease 0.35s both;
  }

  .subhead {
    font-weight: 400;
    font-size: clamp(0.95rem, 1.2vw, 1.05rem);
    line-height: 1.7;
    color: var(--ink-dim);
    max-width: 480px;
    margin-bottom: 3rem;
    animation: riseIn 1.2s ease 0.55s both;
  }

  /* Form */
  .waitlist {
    animation: riseIn 1.2s ease 0.75s both;
    max-width: 520px;
  }

  .form-label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 1.25rem;
    font-weight: 500;
  }

  .form-row {
    display: flex;
    flex-direction: column;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  @media (min-width: 560px) {
    .input-group {
      flex-direction: row;
      gap: 2rem;
    }
    .input-group .field {
      flex: 1;
    }
  }

  .field {
    position: relative;
    padding: 0.5rem 0;
  }

  input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border-strong);
    color: var(--ink);
    font-family: inherit;
    font-size: 1rem;
    font-weight: 400;
    padding: 0.85rem 0;
    outline: none;
    transition: border-color 0.3s ease;
    width: 100%;
  }

  input::placeholder {
    color: var(--ink-faint);
    font-weight: 400;
  }

  input:focus {
    border-bottom-color: var(--ink);
  }

  .btn {
    margin-top: 2rem;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--border-strong);
    font-family: inherit;
    font-size: 0.72rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    font-weight: 500;
    padding: 1rem 1.75rem;
    cursor: pointer;
    border-radius: 100px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: inline-flex;
    align-items: center;
    gap: 0.85rem;
    align-self: flex-start;
  }

  .btn:hover:not(:disabled) {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn .arrow {
    transition: transform 0.3s ease;
    font-weight: 400;
  }

  .btn:hover:not(:disabled) .arrow {
    transform: translateX(4px);
  }

  .message {
    margin-top: 1.25rem;
    font-size: 0.85rem;
    font-weight: 400;
    min-height: 1.25rem;
    letter-spacing: 0.02em;
  }

  .message.error { color: var(--error); }
  .message.success { color: var(--success); }

  /* Success state */
  .success-state {
    display: none;
    animation: riseIn 0.8s ease both;
    max-width: 480px;
  }

  .success-state.visible { display: block; }
  .waitlist.hidden { display: none; }

  .success-mark {
    width: 40px;
    height: 40px;
    border: 1px solid var(--border-strong);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1.75rem;
  }

  .success-mark svg {
    stroke: var(--ink);
    stroke-width: 1;
    fill: none;
  }

  .success-title {
    font-weight: 200;
    font-size: 2rem;
    margin-bottom: 0.85rem;
    letter-spacing: -0.01em;
    line-height: 1.15;
  }

  .success-text {
    color: var(--ink-dim);
    line-height: 1.7;
    font-weight: 400;
    font-size: 0.95rem;
  }

  /* Footer */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    animation: fadeIn 1.2s ease 1s both;
    flex-wrap: wrap;
    gap: 1rem;
    font-weight: 500;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Accessibility */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="page">

  <!-- TOP BAR -->
  <header class="top">
    <div class="logo">CLVR</div>
    <div class="status-pill">
      <span class="pulse"></span>
      <span>Building</span>
    </div>
  </header>

  <!-- HERO -->
  <main class="hero">
    <h1>
      Apps that run<br>
      the heart of<br>
      your operation.
    </h1>

    <p class="subhead">
      CLVR builds tools for restaurants and hotels — made by hospitality people, for hospitality people.
    </p>

    <!-- WAITLIST FORM -->
    <div class="waitlist" id="waitlist">
      <label class="form-label">Join the waitlist</label>
      <form id="waitlist-form" class="form-row" novalidate>
        <div class="input-group">
          <div class="field">
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Name"
              autocomplete="name"
              required
            />
          </div>
          <div class="field">
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Email"
              autocomplete="email"
              required
            />
          </div>
        </div>
        <button type="submit" class="btn" id="submit-btn">
          <span class="btn-text">Request access</span>
          <span class="arrow">→</span>
        </button>
        <div class="message" id="message" role="status" aria-live="polite"></div>
      </form>
    </div>

    <!-- SUCCESS STATE -->
    <div class="success-state" id="success">
      <div class="success-mark">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <polyline points="4 12 10 18 20 6"></polyline>
        </svg>
      </div>
      <div class="success-title">You're on the list.</div>
      <div class="success-text">
        We'll reach out directly when CLVR is ready for you.
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div>Coming soon</div>
    <div>© 2026 CLVR</div>
  </footer>

</div>

<script>
  // ============================================
  // SUPABASE CONFIGURATION
  // Replace these with your own values (see SETUP.md)
  // ============================================
  const SUPABASE_URL = 'YOUR_SUPABASE_URL_HERE';
  const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE';
  const TABLE_NAME = 'waitlist';
  // ============================================

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById('waitlist-form');
  const messageEl = document.getElementById('message');
  const submitBtn = document.getElementById('submit-btn');
  const btnText = submitBtn.querySelector('.btn-text');
  const waitlistDiv = document.getElementById('waitlist');
  const successDiv = document.getElementById('success');

  function showMessage(text, type) {
    messageEl.textContent = text;
    messageEl.className = 'message ' + (type || '');
  }

  function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    showMessage('', '');

    const name = form.name.value.trim();
    const email = form.email.value.trim().toLowerCase();

    if (!name) {
      showMessage('Please enter your name.', 'error');
      return;
    }
    if (!validateEmail(email)) {
      showMessage('Please enter a valid email address.', 'error');
      return;
    }

    submitBtn.disabled = true;
    btnText.textContent = 'Submitting';

    try {
      const { error } = await supabaseClient
        .from(TABLE_NAME)
        .insert([{ name: name, email: email }]);

      if (error) {
        if (error.code === '23505') {
          showMessage("You're already on the list — we've got you.", 'success');
          btnText.textContent = 'Request access';
          submitBtn.disabled = false;
          return;
        }
        throw error;
      }

      waitlistDiv.classList.add('hidden');
      successDiv.classList.add('visible');

    } catch (err) {
      console.error('Waitlist error:', err);
      showMessage('Something went wrong. Please try again in a moment.', 'error');
      btnText.textContent = 'Request access';
      submitBtn.disabled = false;
    }
  });
</script>

</body>
</html>
