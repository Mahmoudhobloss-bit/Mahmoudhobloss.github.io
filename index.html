<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0a0a0a;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 640px;
      width: 100%;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      border: 0.5px solid #333;
      border-radius: 100px;
      padding: 6px 18px;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: clamp(2.5rem, 10vw, 5rem);
      font-weight: 300;
      color: #ffffff;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }

    h1 span {
      color: #555;
    }

    .subtitle {
      font-size: 15px;
      color: #555;
      font-weight: 400;
      line-height: 1.8;
      margin-bottom: 3rem;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #333;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.3s; }
    .dot:nth-child(3) { animation-delay: 0.6s; }

    @keyframes pulse {
      0%, 100% { background: #333; transform: scale(1); }
      50%       { background: #666; transform: scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">We're building something</div>
    <h1>Coming <span>Soon</span></h1>
    <p class="subtitle">Something great is on its way.<br>Check back shortly.</p>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
